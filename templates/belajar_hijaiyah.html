<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deteksi Isyarat - SmartHijaiyah</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>

<body class="bg-emerald-50 min-h-screen flex flex-col">

<header class="bg-white border-b border-emerald-100 py-4 px-6 shadow-sm">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <div class="flex items-center space-x-6">
            <a href="/" class="text-emerald-700 hover:text-emerald-900 flex items-center font-medium transition">
                <i class="fas fa-chevron-left mr-2"></i> Kembali
            </a>
            <!-- MENU KE DASHBOARD DITAMBAHKAN DISINI -->
            <div class="h-6 w-px bg-emerald-100 hidden sm:block"></div>
            <a href="/dashboard" class="text-emerald-600 hover:text-emerald-800 hidden sm:flex items-center font-medium transition">
                <i class="fas fa-th-large mr-2"></i> Dashboard Admin
            </a>
        </div>
        
        <span class="text-lg font-bold text-emerald-800">
            Smart<span class="text-emerald-500">Hijaiyah</span>
        </span>

        <!-- Ikon Dashboard untuk Mobile -->
        <a href="/dashboard" class="sm:hidden text-emerald-600">
            <i class="fas fa-th-large text-xl"></i>
        </a>
    </div>
</header>

<main class="flex-grow flex flex-col lg:flex-row p-6 gap-6 max-w-7xl mx-auto w-full">

    <!-- CAMERA SECTION -->
    <div class="flex-grow">

        <div class="bg-black rounded-3xl overflow-hidden shadow-2xl relative aspect-video border-4 border-white flex items-center justify-center">

            <!-- Placeholder -->
            <div id="camera-placeholder" class="text-white text-center">
                <i class="fas fa-camera text-4xl mb-3"></i>
                <p>Kamera belum aktif</p>
            </div>

            <!-- Stream -->
            <img id="webcam"
                 class="w-full h-full object-cover hidden" />

            <!-- LIVE Indicator -->
            <div id="live-indicator"
                 class="absolute top-4 left-4 bg-red-600 text-white px-3 py-1 rounded-full text-sm font-semibold flex items-center gap-2 hidden">
                <span class="w-2.5 h-2.5 bg-white rounded-full animate-pulse"></span>
                LIVE
            </div>

            <!-- Detection Popup -->
            <div id="detection-msg"
                 class="absolute bottom-6 left-1/2 -translate-x-1/2
                        bg-white/90 backdrop-blur px-6 py-3
                        rounded-2xl shadow-xl flex items-center space-x-3
                        transition-opacity opacity-0">

                <div class="w-8 h-8 bg-emerald-500 rounded-full flex items-center justify-center text-white">
                    <i class="fas fa-check"></i>
                </div>

                <span class="text-emerald-900 font-bold">
                    Terdeteksi
                </span>
            </div>

        </div>

        <!-- Buttons -->
        <div class="flex justify-center gap-4 mt-6">

            <button id="startBtn"
                class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-xl shadow-md transition">
                <i class="fas fa-play mr-2"></i> Mulai
            </button>

            <button id="stopBtn"
                class="bg-red-500 hover:bg-red-600 text-white px-6 py-3 rounded-xl shadow-md transition opacity-50 cursor-not-allowed"
                disabled>
                <i class="fas fa-stop mr-2"></i> Selesai
            </button>

        </div>

    </div>

    <!-- RESULT PANEL -->
    <div class="lg:w-80 bg-white rounded-3xl p-6 shadow-sm border border-emerald-100 text-center">

        <h3 class="text-emerald-900 font-bold mb-6">
            Hasil Deteksi
        </h3>

        <div class="w-40 h-40 bg-emerald-50 rounded-3xl mx-auto flex items-center justify-center mb-4">
            <span id="detected-arabic"
                  class="text-7xl font-bold text-emerald-700">
                  -
            </span>
        </div>

        <h2 id="detected-name"
            class="text-2xl font-bold text-emerald-600 uppercase">
            Menunggu...
        </h2>

    </div>

</main>

<script>

const webcam = document.getElementById('webcam');
const placeholder = document.getElementById('camera-placeholder');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const liveIndicator = document.getElementById('live-indicator');

const detectionMsg = document.getElementById('detection-msg');
const detectedName = document.getElementById('detected-name');
const detectedArabic = document.getElementById('detected-arabic');

let cameraActive = false;
let cooldown = false;

// Mapping huruf lengkap
const arabicMap = {
    "Alif":"أ","Ba":"ب","Ta":"ت","Tsa":"ث","Jim":"ج",
    "Ha":"ح","Kho":"خ","Dal":"د","Dzal":"ذ","Ra":"ر",
    "Zai":"ز","Sin":"س","Syin":"ش","Shad":"ص","Dhad":"ض",
    "Tha":"ط","Zha":"ظ","Ain":"ع","Ghain":"غ","Fa":"ف",
    "Qaf":"ق","Kaf":"ك","Lam":"ل","Mim":"م","Nun":"ن",
    "Waw":"و","Ya":"ي","Lam Alif":"لا"
};

// START CAMERA
startBtn.addEventListener('click', () => {

    if (cameraActive) return;

    webcam.src = "{{ url_for('video_feed_hijaiyah') }}";
    webcam.classList.remove('hidden');
    placeholder.classList.add('hidden');
    liveIndicator.classList.remove('hidden');

    cameraActive = true;

    startBtn.disabled = true;
    startBtn.classList.add("opacity-50","cursor-not-allowed");

    stopBtn.disabled = false;
    stopBtn.classList.remove("opacity-50","cursor-not-allowed");
});

// STOP CAMERA
stopBtn.addEventListener('click', () => {

    if (!cameraActive) return;

    // 🔥 PANGGIL BACKEND UNTUK STOP CAMERA
    fetch('/stop_camera')
        .then(() => {

            webcam.src = "";
            webcam.classList.add('hidden');
            placeholder.classList.remove('hidden');
            liveIndicator.classList.add('hidden');

            cameraActive = false;

            stopBtn.disabled = true;
            stopBtn.classList.add("opacity-50","cursor-not-allowed");

            startBtn.disabled = false;
            startBtn.classList.remove("opacity-50","cursor-not-allowed");

            detectedName.innerText = "Menunggu...";
            detectedLetter.innerText = "-";
        });
});

// CHECK PREDICTION
function checkPrediction() {

    if (!cameraActive) return;

    fetch('/get_prediction_hijaiyah')
        .then(res => res.json())
        .then(data => {

            const predicted = data.prediction;

            if (predicted && !cooldown) {
                showDetection(predicted);
            }
        });
}

function showDetection(name) {

    cooldown = true;

    detectedName.innerText = name;
    detectedArabic.innerText = arabicMap[name] || "?";

    detectionMsg.querySelector('span').innerText =
        `Terdeteksi: ${name}`;

    detectionMsg.style.opacity = '1';

    setTimeout(() => {
        detectionMsg.style.opacity = '0';
        cooldown = false;
    }, 2000);
}

setInterval(checkPrediction, 600);

</script>

</body>
</html>
